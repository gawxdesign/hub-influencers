<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Make Make Beauty — Hub de Influencers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#D4537E;--pink-lt:#FBEAF0;--pink-mid:#ED93B1;
  --green:#1D9E75;--green-lt:#E1F5EE;
  --amber:#BA7517;--amber-lt:#FAEEDA;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --purple:#534AB7;--purple-lt:#EEEDFE;
  --gray:#888780;--gray-lt:#F4F3F0;--gray-border:#E8E5E0;
  --dark:#2C2C2A;--white:#fff;--bg:#F7F5F2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--pink)}
.brand-name{font-family:'DM Serif Display',serif;font-size:17px;color:var(--pink);line-height:1}
.brand-sub{font-size:11px;color:var(--gray);margin-top:1px}
.top-right{display:flex;align-items:center;gap:8px}
.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;background:var(--green-lt);color:var(--green)}
.sync-wait{background:var(--amber-lt);color:var(--amber)}
.btn{font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;padding:7px 15px;border-radius:8px;border:1px solid var(--gray-border);background:var(--white);color:var(--dark);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--gray-lt)}
.btn-pink{background:var(--pink);border-color:var(--pink);color:#fff}
.btn-pink:hover{background:#b83a66;border-color:#b83a66}
.btn-outline{border-color:var(--pink-mid);color:var(--pink);background:var(--pink-lt)}
.btn-sm{font-size:11.5px;padding:5px 11px}
.status-bar{height:3px;background:var(--gray-border);position:relative;overflow:hidden}
.status-bar-fill{height:100%;background:var(--pink);width:0;transition:width .4s ease}
#syncMsg{font-size:11px;color:var(--gray);padding:4px 28px;text-align:right;min-height:20px;background:var(--white)}
.page{max-width:980px;margin:0 auto;padding:24px 20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--white);border-radius:12px;padding:14px 16px;border:1px solid var(--gray-border);transition:transform .1s}
.stat:hover{transform:translateY(-1px)}
.stat-num{font-size:24px;font-weight:600;line-height:1}
.stat-lbl{font-size:10.5px;color:var(--gray);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px 8px 34px;border:1px solid var(--gray-border);border-radius:8px;background:var(--white);color:var(--dark);outline:none;transition:border .15s}
.search-wrap input:focus{border-color:var(--pink-mid)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--gray)}
.filter-sel{font-family:'DM Sans',sans-serif;font-size:12.5px;padding:8px 11px;border:1px solid var(--gray-border);border-radius:8px;background:var(--white);color:var(--dark);outline:none;cursor:pointer}
.table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--gray-border);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--pink)}
thead th{font-size:10.5px;font-weight:600;color:rgba(255,255,255,.9);text-align:left;padding:11px 10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
thead th:last-child{text-align:center}
tbody tr{border-bottom:1px solid #f2efe9;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fdf9f7}
tbody tr:nth-child(even){background:#FAFAF8}
tbody tr:nth-child(even):hover{background:#fdf9f7}
td{padding:9px 10px;font-size:13px;vertical-align:middle}
.td-name{font-weight:500;color:var(--dark)}
.td-city{font-size:11.5px;color:var(--gray)}
.td-insta{font-size:11.5px;color:var(--pink);font-weight:500}
td[contenteditable=true]{cursor:text;border-radius:4px;outline:none}
td[contenteditable=true]:focus{background:var(--pink-lt);box-shadow:0 0 0 2px var(--pink-mid)}
span[contenteditable=true]{cursor:text;border-radius:3px;outline:none;display:inline-block}
span[contenteditable=true]:focus{background:var(--pink-lt);box-shadow:0 0 0 2px var(--pink-mid);padding:0 2px}
.td-center{text-align:center}
.td-actions{text-align:center;width:36px}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.p-green{background:var(--green-lt);color:var(--green)}
.p-amber{background:var(--amber-lt);color:var(--amber)}
.p-red{background:var(--red-lt);color:var(--red)}
.p-gray{background:var(--gray-lt);color:var(--gray)}
.status-sel{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;border:none;border-radius:20px;padding:3px 8px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;min-width:80px;text-align:center}
.cupom-tag{font-size:11px;font-weight:600;background:var(--purple-lt);color:var(--purple);padding:2px 8px;border-radius:6px;letter-spacing:.04em;font-family:monospace}
.desc-tag{font-size:11px;font-weight:600;background:#fff3e0;color:#e65100;padding:2px 7px;border-radius:6px;margin-left:4px}
.edit-btn{font-size:13px;padding:3px 8px;border:1px solid var(--gray-border);border-radius:6px;background:transparent;cursor:pointer;color:var(--gray);line-height:1;transition:all .15s}
.edit-btn:hover{background:var(--pink-lt);border-color:var(--pink-mid);color:var(--pink)}
.empty{text-align:center;padding:40px;color:var(--gray);font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:28px;width:94%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-head h3{font-family:'DM Serif Display',serif;font-size:19px;color:var(--pink)}
.modal-close{font-size:18px;cursor:pointer;color:var(--gray);background:none;border:none;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--dark)}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-row input,.form-row select,.form-row textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;border:1px solid var(--gray-border);border-radius:8px;color:var(--dark);background:var(--white);outline:none;transition:border .15s}
.form-row input:focus,.form-row select:focus{border-color:var(--pink-mid);box-shadow:0 0 0 3px var(--pink-lt)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid var(--gray-border)}
.btn-del{background:var(--red-lt);border:1px solid #F09595;color:var(--red);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:500}
.btn-del:hover{background:#f7c1c1}
.toast{position:fixed;bottom:22px;right:22px;background:var(--dark);color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px;padding:12px 16px;background:var(--white);border-radius:10px;border:1px solid var(--gray-border)}
.legend-lbl{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-right:4px}
.section-divider{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;padding:6px 10px;background:var(--gray-lt);border-bottom:1px solid var(--gray-border)}
@media print{
  .topbar .top-right,.toolbar,.edit-btn,.status-bar,#syncMsg,.legend{display:none!important}
  body{background:#fff}.page{padding:0}
  .table-wrap{border:none}
  .stats{break-inside:avoid}tr{break-inside:avoid}
}
@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .topbar{padding:0 14px}
  .page{padding:16px 12px}
  table{font-size:12px}td{padding:8px 6px}
  .form-2,.form-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <div class="brand-name">Make Make Beauty</div>
      <div class="brand-sub">Hub de Influencers</div>
    </div>
  </div>
  <div class="top-right">
    <div id="syncBadge" class="sync-badge sync-wait">● Carregando</div>
    <button class="btn btn-sm" onclick="openAdd()">+ Influencer</button>
    <button class="btn btn-sm btn-outline" onclick="window.print()">Imprimir / PDF</button>
  </div>
</div>
<div class="status-bar"><div class="status-bar-fill" id="syncBar"></div></div>
<div id="syncMsg"></div>

<div class="page">
  <div class="stats" id="statsBar"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar nome, cidade, @, cupom..." oninput="render()">
    </div>
    <select class="filter-sel" id="filterKit" onchange="render()">
      <option value="">Todos os kits</option>
      <option value="Enviado">Enviado</option>
      <option value="Entregue">Entregue</option>
      <option value="Não enviado">Não enviado</option>
    </select>
    <select class="filter-sel" id="filterPost" onchange="render()">
      <option value="">Todas postagens</option>
      <option value="Postou">Postou</option>
      <option value="Aguardando">Aguardando</option>
      <option value="Prometeu">Prometeu</option>
      <option value="Não postou">Não postou</option>
    </select>
    <select class="filter-sel" id="filterCupom" onchange="render()">
      <option value="">Todos os cupons</option>
      <option value="com">Com cupom</option>
      <option value="sem">Sem cupom</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:150px">Influencer</th>
          <th style="width:145px">Cidade</th>
          <th style="width:110px">Instagram</th>
          <th style="width:80px;text-align:center">Kit</th>
          <th style="width:155px;text-align:center">Cupom / Desconto</th>
          <th style="width:95px;text-align:center">Link postagem</th>
          <th style="width:90px;text-align:center">Postagem</th>
          <th style="width:36px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="legend">
    <span class="legend-lbl">Status:</span>
    <span class="pill p-green">Enviado / Postou</span>
    <span class="pill p-amber">Aguardando / Prometeu</span>
    <span class="pill p-red">Não enviado / Não postou</span>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeIfOut(event)">
<div class="modal">
  <div class="modal-head">
    <h3 id="modalTitle">Nova influencer</h3>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="form-2">
    <div class="form-row" style="margin-bottom:0"><label>Nome</label><input id="f_nome" placeholder="Nome completo"></div>
    <div class="form-row" style="margin-bottom:0"><label>Instagram</label><input id="f_insta" placeholder="@usuario"></div>
  </div>
  <div class="form-row" style="margin-top:14px"><label>Cidade</label><input id="f_cidade" placeholder="Cidade — UF"></div>
  <div class="form-2">
    <div class="form-row" style="margin-bottom:0"><label>Status do kit</label>
      <select id="f_kit">
        <option>Enviado</option><option>Entregue</option><option>Não enviado</option>
      </select>
    </div>
    <div class="form-row" style="margin-bottom:0"><label>Postagem</label>
      <select id="f_post">
        <option>Aguardando</option><option>Postou</option><option>Prometeu</option><option>Não postou</option>
      </select>
    </div>
  </div>
  <div class="form-3" style="margin-top:14px">
    <div class="form-row" style="margin-bottom:0"><label>Cupom</label><input id="f_cupom" placeholder="NOME10" style="text-transform:uppercase"></div>
    <div class="form-row" style="margin-bottom:0"><label>Desconto %</label><input id="f_desconto" placeholder="10" type="number" min="0" max="100"></div>
    <div class="form-row" style="margin-bottom:0"><label>Plataforma</label>
      <select id="f_plataforma">
        <option value="">—</option>
        <option>Shopee</option>
        <option>TikTok Shop</option>
        <option>Site</option>
        <option>Shopee + TikTok</option>
      </select>
    </div>
  </div>
  <div class="form-row" style="margin-top:14px"><label>E-mail (para gerar cupom)</label><input id="f_email" placeholder="email@exemplo.com" type="email"></div>
  <div class="form-row"><label>Link da postagem</label><input id="f_link" placeholder="https://instagram.com/p/..."></div>
  <div class="form-row"><label>Observações</label><textarea id="f_obs" rows="2" style="resize:vertical" placeholder="Notas internas..."></textarea></div>
  <div class="modal-foot">
    <button class="btn-del" id="btnDel" style="display:none" onclick="deleteInfluencer()">Excluir</button>
    <button class="btn" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-pink" onclick="saveModal()">Salvar</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

function loadData() {
  setSyncMsg('Conectando ao Firebase...', 'amber');
  setBadge(false, null, true);

  const colRef = collection(db, COL);

  onSnapshot(colRef, async (snapshot) => {
    if (snapshot.empty) {
      // Banco vazio → sobe os dados iniciais automaticamente
      setSyncMsg('Carregando dados iniciais...', 'amber');
      const batch = writeBatch(db);
      SEED.forEach((d, i) => {
        const id  = 'id_' + i + '_' + Date.now();
        const ref = doc(db, COL, id);
        batch.set(ref, { ...d, id, ordem: i });
      });
      await batch.commit();
      // O onSnapshot vai disparar de novo com os dados recém-inseridos
      return;
    }

    data = snapshot.docs.map(d => d.data()).sort((a, b) => (a.ordem ?? 0) - (b.ordem ?? 0));
    setBadge(true, 'Sincronizado · ' + new Date().toLocaleTimeString('pt-BR'));
    render();
  }, (err) => {
    console.error(err);
    setBadge(false, 'Erro de conexão');
    setSyncMsg('Erro ao conectar com o Firebase. Verifique as credenciais.', 'red');
  });
}

// ── SALVAR / ATUALIZAR um documento ──────────
async function saveDoc(obj) {
  animateBar();
  try {
    await setDoc(doc(db, COL, obj.id), obj);
    setBadge(true, 'Salvo · ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e) {
    console.error(e);
    setBadge(false, 'Erro ao salvar');
    toast('Erro ao salvar no Firebase', true);
  }
}

// ── DELETAR um documento ─────────────────────
async function deleteDoc_(id) {
  animateBar();
  try {
    await deleteDoc(doc(db, COL, id));
    setBadge(true, 'Removido · ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e) {
    console.error(e);
    setBadge(false, 'Erro ao remover');
    toast('Erro ao remover do Firebase', true);
  }
}

// ── CRUD (funções chamadas pelo HTML) ─────────
window.updateField = async function(id, field, val) {
  const d = data.find(x => x.id === id);
  if (!d) return;
  if (field === 'cupom') { val = val.replace(/[^\w]/g,'').toUpperCase(); if (val === '—') val = ''; }
  d[field] = val;
  renderStats();
  await saveDoc(d);
};

window.saveModal = async function() {
  const nome = document.getElementById('f_nome').value.trim();
  if (!nome) { toast('Nome obrigatório', true); return; }
  const cupom = document.getElementById('f_cupom').value.trim().toUpperCase();
  const obj = {
    id:         editId || ('id_' + Date.now()),
    nome,
    insta:      document.getElementById('f_insta').value.trim(),
    cidade:     document.getElementById('f_cidade').value.trim(),
    kit:        document.getElementById('f_kit').value,
    post:       document.getElementById('f_post').value,
    cupom,
    desconto:   document.getElementById('f_desconto').value.trim(),
    plataforma: document.getElementById('f_plataforma').value,
    email:      document.getElementById('f_email').value.trim(),
    link:       document.getElementById('f_link').value.trim(),
    obs:        document.getElementById('f_obs').value.trim(),
    ordem:      editId ? (data.find(d => d.id === editId)?.ordem ?? data.length) : data.length,
  };
  closeModal();
  await saveDoc(obj);
  toast(editId ? 'Atualizado ✓' : obj.nome + ' adicionada ✓');
};

window.deleteInfluencer = async function() {
  if (!confirm('Excluir esta influencer?')) return;
  closeModal();
  await deleteDoc_(editId);
  toast('Removida ✓');
};

// ── HELPERS ───────────────────────────────────
window.makeSelect = function(field, val, id) {
  const opts = (field === 'kit' ? KIT_OPTS : POST_OPTS)
    .map(o => `<option${o===val?' selected':''}>${o}</option>`).join('');
  return `<select class="status-sel" style="background:${BG[val]||'#F4F3F0'};color:${FG[val]||'#888'}"
    onchange="updateField('${id}','${field}',this.value);this.style.background=({'Enviado':'#E1F5EE','Entregue':'#E1F5EE','Postou':'#E1F5EE','Aguardando':'#FAEEDA','Prometeu':'#FAEEDA','Não enviado':'#FCEBEB','Não postou':'#FCEBEB'})[this.value]||'#F4F3F0';this.style.color=({'Enviado':'#0F6E56','Entregue':'#0F6E56','Postou':'#0F6E56','Aguardando':'#854F0B','Prometeu':'#854F0B','Não enviado':'#A32D2D','Não postou':'#A32D2D'})[this.value]||'#888'">${opts}</select>`;
};

function filtered() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fk = document.getElementById('filterKit').value;
  const fp = document.getElementById('filterPost').value;
  const fc = document.getElementById('filterCupom').value;
  return data.filter(d => {
    const matchQ = !q || (d.nome+d.cidade+(d.insta||'')+(d.cupom||'')+(d.obs||'')).toLowerCase().includes(q);
    const matchK = !fk || d.kit === fk;
    const matchP = !fp || d.post === fp;
    const matchC = !fc || (fc==='com' ? !!d.cupom : !d.cupom);
    return matchQ && matchK && matchP && matchC;
  });
}

function renderStats() {
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-num" style="color:var(--pink)">${data.length}</div><div class="stat-lbl">Influencers</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)">${data.filter(d=>d.kit==='Enviado'||d.kit==='Entregue').length}</div><div class="stat-lbl">Kits enviados</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--amber)">${data.filter(d=>d.post==='Postou').length}</div><div class="stat-lbl">Postaram</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--purple)">${data.filter(d=>d.cupom&&d.cupom.trim()).length}</div><div class="stat-lbl">Cupons ativos</div></div>
  `;
}

window.render = function() {
  renderStats();
  const list = filtered();
  const tbody = document.getElementById('tbody');
  if (!list.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhuma influencer encontrada.</td></tr>'; return; }
  tbody.innerHTML = list.map(d => `
    <tr>
      <td class="td-name" contenteditable="true" onblur="updateField('${d.id}','nome',this.innerText.trim())">${d.nome}</td>
      <td class="td-city" contenteditable="true" onblur="updateField('${d.id}','cidade',this.innerText.trim())">${d.cidade}</td>
      <td><span class="td-insta" contenteditable="true" onblur="updateField('${d.id}','insta',this.innerText.trim())">${d.insta||''}</span></td>
      <td class="td-center">${makeSelect('kit', d.kit, d.id)}</td>
      <td class="td-center">${d.cupom
        ? `<span class="cupom-tag">${d.cupom}</span>${d.desconto ? `<span class="desc-tag">${d.desconto}%</span>` : ''}`
        : `<span style="font-size:11px;color:var(--gray)">—</span>`}</td>
      <td class="td-center">${d.link
        ? `<a href="${d.link}" target="_blank" style="font-size:11px;color:var(--pink);text-decoration:none;font-weight:500">Ver post ↗</a>`
        : `<span style="font-size:11px;color:var(--gray)">—</span>`}</td>
      <td class="td-center">${makeSelect('post', d.post, d.id)}</td>
      <td class="td-actions"><button class="edit-btn" onclick="openEdit('${d.id}')">✎</button></td>
    </tr>
  `).join('');
};

window.openEdit = function(id) {
  const d = data.find(x => x.id === id);
  if (!d) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Editar — ' + d.nome;
  document.getElementById('btnDel').style.display = 'inline-block';
  document.getElementById('f_nome').value       = d.nome || '';
  document.getElementById('f_insta').value      = d.insta || '';
  document.getElementById('f_cidade').value     = d.cidade || '';
  document.getElementById('f_kit').value        = d.kit || 'Enviado';
  document.getElementById('f_post').value       = d.post || 'Aguardando';
  document.getElementById('f_cupom').value      = d.cupom || '';
  document.getElementById('f_desconto').value   = d.desconto || '';
  document.getElementById('f_plataforma').value = d.plataforma || '';
  document.getElementById('f_email').value      = d.email || '';
  document.getElementById('f_link').value       = d.link || '';
  document.getElementById('f_obs').value        = d.obs || '';
  document.getElementById('overlay').classList.add('open');
};

window.openAdd = function() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Nova influencer';
  document.getElementById('btnDel').style.display = 'none';
  ['f_nome','f_insta','f_cidade','f_cupom','f_desconto','f_email','f_link','f_obs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_kit').value        = 'Não enviado';
  document.getElementById('f_post').value       = 'Aguardando';
  document.getElementById('f_plataforma').value = '';
  document.getElementById('overlay').classList.add('open');
};

window.toast = function(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#A32D2D' : '#2C2C2A';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};

window.closeModal    = function() { document.getElementById('overlay').classList.remove('open'); };
window.closeIfOut    = function(e) { if (e.target === document.getElementById('overlay')) closeModal(); };

function setBadge(ok, msg, loading) {
  const b = document.getElementById('syncBadge');
  if (loading) {
    b.textContent = '● Conectando';
    b.style.cssText = 'background:var(--amber-lt);color:var(--amber)';
    return;
  }
  b.textContent = ok ? '● Sincronizado' : '● Erro';
  b.style.cssText = ok
    ? 'background:var(--green-lt);color:var(--green)'
    : 'background:var(--red-lt);color:var(--red)';
  if (msg) setSyncMsg(msg, ok ? 'green' : 'red');
}

function setSyncMsg(msg, color) {
  const el = document.getElementById('syncMsg');
  const c = {green:'var(--green)',amber:'var(--amber)',red:'var(--red)',gray:'var(--gray)'};
  el.textContent = msg;
  el.style.color = c[color] || 'var(--gray)';
}

function animateBar() {
  const bar = document.getElementById('syncBar');
  bar.style.width = '60%';
  setTimeout(() => { bar.style.width = '100%'; setTimeout(() => bar.style.width = '0', 300); }, 200);
}

// ── INICIAR ───────────────────────────────────
loadData();

</script>
